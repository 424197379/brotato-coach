name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Mod ZIP
        shell: pwsh
        run: ./scripts/build_mod_zip.ps1

      - name: Run acceptance tests
        shell: pwsh
        run: |
          python ./tests/p1_acceptance.py
          $exitCode = $LASTEXITCODE
          if (Test-Path "private/dev-docs/test-reports/p1-acceptance-results.json") {
            Get-Content -Raw "private/dev-docs/test-reports/p1-acceptance-results.json"
          }
          exit $exitCode
